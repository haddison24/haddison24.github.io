<!DOCTYPE html>
<html>
<head>
    <title>Hadi's Grocery Store</title>
</head>
<body>

<h1 id="greeting"></h1>
<p id="orderInfo"></p>
<p id="arrival"></p>

<script>

alert("Welcome to the Hadi's Grocery Store!");

let name = prompt("What is your name?");
let item = prompt("What item would you like?");
let quantity = prompt("How many items would you like? (1-99)");
if (quantity < 1 || quantity > 99) {
    alert("Please Dont Waste My Time, Enter a Valid Number");
    quantity = prompt("How many items would you like? (1-99)");
}

quantity = Number(quantity);

let now = new Date();
let hour = now.getHours();

let greeting;

if (hour < 12) {
    greeting = "Good Morning";
} else if (hour < 18) {
    greeting = "Good Afternoon";
} else {
    greeting = "Good Evening";
}

document.getElementById("greeting").innerHTML =
    greeting + " " + name + ", thank you for ordering!";

document.getElementById("orderInfo").innerHTML =
    "You ordered " + quantity + " " + item + "(s).";

let arrivalDate = new Date();
arrivalDate.setDate(arrivalDate.getDate() + 7);

document.getElementById("arrival").innerHTML =
    "Your order will arrive on: " + arrivalDate.toDateString();

</script>

</body>
</html>
